{% if config.extra.alternate %}
<div class="md-header__option lang-switch">  {% for alt in config.extra.alternate %}
    
    {% if alt.link.startswith('/') %}
      {% set url = alt.link %}
    {% else %}
      {% set url = '/' ~ alt.link %}
    {% endif %}
    
    <a href="{{ url }}" class="md-header__button" title="{{ alt.name }}">
      <img src="/assets/flags/{{ alt.lang }}.png"
           alt="{{ alt.lang }}"
           style="height:14px;margin-right:4px;vertical-align:-2px;">
      {{ alt.name }}
    </a>
  {% endfor %}
</div>
{% endif %}
